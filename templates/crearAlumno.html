{% extends "base.html" %}
{% block title %}Nuevo Alumno{% endblock %}

{% block content %}
<form method="POST" action="/alumnos/nuevo">
    <label>Nombre del alumno:</label>
    <input type="text" name="nombre_alumno" required>
    
    <label>Apellidos del alumno:</label>
    <input type="text" name="apellidos_alumno" required>

    <label>Fecha de nacimiento del alumno:</label>
    <input type="datetime" name="fecha_nacimiento_alumno" required>

    <label>DNI del alumno:</label>
    <input type="text" name="dni_alumno" required>

    <label>Dinero del alumno:</label>
    <input type="number" name="dinero_alumno" min="0" required>
    
    <button type="submit">Crear alumno</button>
</form>
{% endblock %}
