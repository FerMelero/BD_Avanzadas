{% extends "base.html" %}
{% block title %}Modificar Asignatura{% endblock %}

{% block content %}
<h1>Modificar Asignatura: {{ asignatura.nombre_asignatura.es }} ({{ asignatura.nombre_asignatura.en }})</h1>

<form method="POST" action="{{ url_for('asignaturas.edit_asignatura', id_asignatura=asignatura.id_asignatura) }}" style="max-width: 500px;">
    
    <div style="margin-bottom: 15px;">
        <label>Nombre de la Asignatura (Español):</label><br>
        <input type="text" name="nombre_asignatura_es" value="{{ asignatura.nombre_asignatura.es }}" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 15px;">
        <label>Nombre de la Asignatura (Inglés):</label><br>
        <input type="text" name="nombre_asignatura_en" value="{{ asignatura.nombre_asignatura.en }}" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 15px;">
        <label>Profesor Asignado:</label><br>
        <select name="id_profesor" required style="width: 100%; padding: 5px;">
            {% for p in profesores %}
                <option value="{{ p.id_profesor }}" {% if p.id_profesor == asignatura.id_profesor %}selected{% endif %}>
                    {{ p.nombre }} {{ p.apellido }} (ID: {{ p.id_profesor }})
                </option>
            {% endfor %}
        </select>
    </div>

    <div style="margin-bottom: 15px;">
        <label>Precio:</label><br>
        <input type="number" step="0.01" name="precio" value="{{ asignatura.precio }}" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 15px;">
        <label>Capacidad Máxima:</label><br>
        <input type="number" name="capacidad_max" value="{{ asignatura.capacidad_max }}" required style="width: 100%;">
    </div>

    <button type="submit" style="background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">
        Guardar Cambios
    </button>
</form>
{% endblock %}
