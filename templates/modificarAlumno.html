{% extends "base.html" %}
{% block title %}Editar Alumno{% endblock %}

{% block content %}
<h1>Editar Alumno: {{ alumno.nombre }}</h1>

<form method="POST" action="{{ url_for('alumnos.edit_alumno', id_alumno=alumno.id_alumno) }}" style="max-width: 500px;">
    <input type="hidden" name="id_alumno" value="{{ alumno.id_alumno }}">

    <div style="margin-bottom: 15px;">
        <label>Nombre:</label><br>
        <input type="text" name="nombre" value="{{ alumno.nombre }}" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 15px;">
        <label>Apellido:</label><br>
        <input type="text" name="apellido" value="{{ alumno.apellido }}" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 15px;">
        <label>DNI:</label><br>
        <input type="text" name="dni" value="{{ alumno.dni }}" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 15px;">
        <label>Fecha de Nacimiento:</label><br>
        <input type="date" name="fecha_nacimiento" value="{{ alumno.fecha_nacimiento }}" required style="width: 100%;">
    </div>

    <div style="margin-bottom: 15px;">
        <label>Dinero:</label><br>
        <input type="number" step="0.01" name="dinero" value="{{ alumno.dinero }}" required style="width: 100%;">
    </div>

    <button type="submit" style="background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">
        Actualizar Alumno
    </button>
    <a href="{{ url_for('alumnos.list_') }}" style="margin-left: 10px;">Cancelar</a>
</form>
{% endblock %}
