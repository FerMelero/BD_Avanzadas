{% extends "base.html" %}
{% block title %}Nuevo Curso{% endblock %}

{% block content %}
<h1 style="color: #000000;">Crear Nuevo Curso</h1>

<form method="POST" action="{{ url_for('cursos.new_curso') }}" style="max-width: 500px; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; color: #000000;">
    
    <div style="margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-left: 5px solid #007bff; background: #ffffff;">
        <label style="font-weight: bold; color: #000000;">Configuración Multi-idioma</label>
        <p style="font-size: 0.85em; color: #000000; margin-top: 5px;">Introduce el nombre en ambos idiomas para el soporte JSONB.</p>
        
        <div style="margin-top: 10px;">
            <label style="color: #000000;"><small>Nombre (Español):</small></label><br>
            <input type="text" name="nombre_es" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; color: #000000;">
        </div>

        <div style="margin-top: 10px;">
            <label style="color: #000000;"><small>Nombre (Inglés):</small></label><br>
            <input type="text" name="nombre_en" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; color: #000000;">
        </div>
    </div>

    <div style="margin-bottom: 15px;">
        <label style="font-weight: bold; color: #000000;">Profesor Asignado:</label><br>
        <select name="id_profesor" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; color: #000000;">
            <option value="" style="color: #000000;">-- Selecciona un profesor --</option>
            {% for p in profesores %}
                <option value="{{ p.id_profesor }}" style="color: #000000;">{{ p.nombre }} {{ p.apellido }}</option>
            {% endfor %}
        </select>
    </div>

    <div style="margin-bottom: 15px;">
        <label style="font-weight: bold; color: #000000;">Capacidad Máxima (Plazas):</label><br>
        <input type="number" name="capacidad_max" min="1" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; color: #000000;">
    </div>

    <div style="margin-bottom: 15px;">
        <label style="font-weight: bold; color: #000000;">Precio del Curso (€):</label><br>
        <input type="number" name="precio" min="0" step="0.01" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; color: #000000;">
    </div>

    <div style="margin-top: 20px;">
        <button type="submit" style="background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
            Guardar Curso
        </button>
        <a href="{{ url_for('cursos.list_') }}" style="margin-left: 15px; color: #000000; text-decoration: underline;">Cancelar</a>
    </div>
</form>
{% endblock %}
